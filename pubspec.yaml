name: grocery_tracker
description: A simple grocery tracker app for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  image_picker: ^0.8.7+5
  path_provider: ^2.0.16
  intl: ^0.18.1
  sqflite: ^2.2.8+4
  path: ^1.8.4
  google_sign_in: ^6.0.0
  crypto: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
